<body>
    <h1 id="head1">heading 1</h1>
    <h2 id="head2">heading 2</h2>
    <h3 id="head3">heading 3</h3>
    <button id="btn">Change</button>
    
    <script>
        let heading1 = document.getElementById("head1");
        let heading2 = document.getElementById("head2");
        let heading3 = document.getElementById("head3");
        let button1 = document.getElementById("btn");

        button1.addEventListener("click", async ()=>{
            try{
            await changeColor(heading1, "yellow", 1000);
            await changeColor(heading2, "red", 2000);
            await changeColor(heading3, "green", 3000);
            }
            catch{
                console.log(err);
            }
        })

        function changeColor(element, color1, time){
            return new Promise ((resolve, reject)=>{
                if(element){
                    setTimeout(()=>{
                        element.style.color = color1;
                        resolve();
                    }, time);
                }
                else{
                    reject(new Error("The element doesn't exist"));
                }
            })
        }
