<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--Prototype - an object from which other object inherits properties and method -->
    <!-- proto - property of an object -->
    <script>
        let student1 = {
            name: "Supriya",
            age: 20
        }
        let student2 = Object.create(student1); //let student2 ={..proto...student1}
        console.log(student1);
        console.log(student2);
    </script>
</body>
</html>
