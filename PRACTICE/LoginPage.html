<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }
    body{
        background: aliceblue;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .container{
        display: flex;
        align-items: center;
        gap: 100px;
    }
    .left{
        width: 400px;
    }
    .left h1{
        color: rgb(32, 32, 228);
    }
    .left p{
        font-size: 25px;
    }
    .right{
        background: white;
        padding: 20px;
        width: 350px;
        border-radius: 10px;
        text-align: center;
    }
    input{
        width: 100%;
        padding: 12px;
        margin:8px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
    }
    .login-btn{
        width: 100%;
        padding: 12px;
        background: #1877f2;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 18px;
        cursor: pointer;
    }
    .forgot{
        display: block;
        margin: 12px 0;
        color: #1877f2;
        text-decoration: none;
    }
    hr{
        margin: 15px 0;
    }
    .create{
        background: #42b72a;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }
</style>
<body>
    <div class="container">
    <div class="left">
        <h1>Facebook</h1>
        <p>Helps you to connect with people all over the world</p>
    </div>
    <div class="right">
        <form>
            <input type="text" placeholder="Email address or contact number"><br>
            <input type="password" placeholder="Password">
            <button class="login-btn" onclick="check()">Login</button>
            <a href="" class="forgot">Forgotten password?</a><hr>
            <button class="create">
                Create a new acoount
            </button>
        </form>
    </div>
    </div>
    <script>
        function check(){
            alert("Login successful");
        }
    </script>
</body>
</html>
