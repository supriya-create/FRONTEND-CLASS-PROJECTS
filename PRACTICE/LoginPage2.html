<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }
    body{
        background: #f4f4f4; 
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }
    .container{
        display: flex;
        width: 100%;
        background: white;
        overflow: hidden;
    }
    .left{
        background: rgba(1, 124, 217, 0.621);
        color: white;
        padding: 40px;
        width: 50%;
       
    }
    .right{
        padding: 20px;
        width: 50%;
    }
    input, textarea{
        width: 100%;
        margin: 8px 0;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    .btn{
        background-color: rgb(111, 149, 245);
        width: 100%;
        border-radius: 6px;
        border: solid 1px black;
    }
</style>
<body>
    <div class="container">
        <div class="left">
            <h1>Contact Us</h1>
            <p>Have questions or suggestions?</p>
            <p>Fill out the form and our team will get back to you soon.</p>
        </div>
        <div class="right">
            <h1>Send Message</h1>
            <input type="text" placeholder="Your Name" required><br>
            <input type="email" placeholder="Your Email" required><br>
            <textarea rows="4" placeholder="Your Message"></textarea><br>
            <button class="btn" onclick="send()">Submit</button>
        </div>
    </div>
    <script>
        function send(){
            alert("Your Message is submitted");
        }
    </script>
</body>
</html>
