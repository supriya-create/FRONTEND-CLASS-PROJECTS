<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <div>
            <label for="fname">First name: </label>
            <input type="text" id="fname" name="fname" placeholder="Enter Firstname">
        </div><br>
        <div>
            <label for="lname">Last name: </label>
            <input type="text" id="lname" name="lname" placeholder="Enter Lastname">
        </div><br>
        <div>
            <label for="password">Password: </label>
            <input type="password" id="password" name="password">
        </div><br>
        <div>
            <label for="email">Email: </label>
            <input type="email" id="email" name="email" required placeholder="xyz@gmail.com">
        </div><br>
        <div>
            <label for="phone">Phone: </label>
            <input type="number" id="phone" name="phone" placeholder="(123)-456-7890">
        </div><br>
        <div>
            <label for="dob">Birthdate: </label>
            <input type="date" id="dob" name="dob">
        </div><br>
        <div>
            <label for="quantity">Quantity: </label>
            <input type="number" id="quantity" name="quantity" min="1" max="5">
        </div><br>
        <div>
            <label for="title">Title: </label>
            
            <label for="Mr.">Mr.</label>
            <input type="radio" id="Mr." name="Mr.">

            <label for="Mrs.">Mrs.</label>
            <input type="radio" id="Mrs." name="Mrs.">

            <label for="Phd.">Phd.</label>
            <input type="radio" id="Phd." name="Phd.">
        </div><br>

        <div>
            <label for="payment">Payment: </label>
            <select id="payment" name="payment">
                <option value="visa">Visa</option>
                <option value="debitcard">Debit Card</option>
                <option value="Credit Card">Credit Card</option>
            </select>
        </div><br>

        <div>
            <label for="checkbox">Subscribe: </label>
            <input type="checkbox" id="checkbox" name="checkbox">
        </div><br>

        <div>
            <input type="reset">
        </div><br>

        <div>
            <input type="submit">
        </div>

    </form>
</body>
</html>
